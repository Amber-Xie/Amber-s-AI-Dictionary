<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FDFCF8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <title>英语词典</title>
    <script>
      ;(function () {
        if (window.location.hash) return
        var base = '%BASE_URL%'
        if (!base || base === '/') return
        var root = base.endsWith('/') ? base.slice(0, -1) : base
        var path = window.location.pathname
        if (path.indexOf(root) !== 0) return
        var rest = path.slice(root.length)
        if (rest && rest !== '/' && rest.indexOf('.') === -1) {
          window.location.replace(root + '/#' + rest)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
